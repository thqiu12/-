# =============================================================================
# /etc/nginx/sites-available/senmon
#   senmon-nyuugaku 用 nginx 設定
#
#   - HTTP (80) で稼働。certbot --nginx を後で実行すると自動的に :443 を追加
#   - リバプロ先: 127.0.0.1:3000 (Next.js / PM2)
#   - アップロードファイルは Next.js 経由でのみ配信（直接配信しない）
#   - 静的アセットは Next.js が直接返す（_next/static/ をキャッシュ可能化）
# =============================================================================

# Next.js への接続をストリーム化（PDF ダウンロード等の長いレスポンス向け）
upstream senmon_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

# レート制限ゾーン定義（IP ベース）
limit_req_zone $binary_remote_addr zone=senmon_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=senmon_login:10m   rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    # ↓ certbot --nginx 実行後にドメインに置換される
    server_name 160.16.132.198 _;

    # アップロードサイズ（フォームに合わせて 15MB）
    client_max_body_size 15M;

    # 圧縮
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/json application/javascript application/xml
        text/css text/javascript text/plain text/xml
        image/svg+xml;

    # アクセスログ
    access_log /var/log/nginx/senmon-access.log;
    error_log  /var/log/nginx/senmon-error.log warn;

    # セキュリティヘッダは Next.js (next.config.mjs) 側で完全制御。
    # nginx で add_header すると重複してしまい、書類プレビュー iframe や
    # API レスポンスのヘッダ制御を上書きできなくなるため、ここでは追加しない。

    # ヘルスチェック（外部ヘルスチェッカー用、ログ抑制）
    location = /api/health {
        access_log off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass http://senmon_upstream;
    }

    # ログイン系のレート制限（ブルートフォース対策）
    location ~ ^/api/(login|admin/login|password-reset) {
        limit_req zone=senmon_login burst=3 nodelay;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://senmon_upstream;
    }

    # 通常のリクエスト
    location / {
        limit_req zone=senmon_general burst=40 nodelay;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # PDF 生成は時間がかかるのでタイムアウトを長めに
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 10s;

        proxy_pass http://senmon_upstream;
    }

    # Next.js の静的アセットは長期キャッシュ可
    location /_next/static/ {
        proxy_set_header Host $host;
        proxy_pass http://senmon_upstream;
        proxy_cache_valid 200 365d;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # /uploads/ への直接アクセスを拒否（必ず /api/documents/[id]/file 経由）
    location /uploads/ {
        deny all;
        return 404;
    }
    location /private/ {
        deny all;
        return 404;
    }

    # 隠しファイル・バックアップファイルを拒否
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ \.(env|sqlite|sqlite-journal|db|db-journal)$ {
        deny all;
    }
}
